name: auto-merge-to-develop

# Org-level reusable-workflow caller (scitex-ai/.github; fleet CI
# unification wave 2). Merge green PRs that TARGET develop, the moment
# their checks complete - job body lives org-side so it cannot drift
# per-repo. GitHub reads check_suite-triggered workflows from the
# DEFAULT branch (main), so this caller stub must live on main; it acts
# ONLY on PRs whose base is develop.

on:
  check_suite:
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    uses: scitex-ai/.github/.github/workflows/auto-merge-to-develop.yml@main
    secrets: inherit
