name: quality

# Single-package quality gate — runs `scitex-dev ecosystem audit-all`
# against this package (audit-cli / audit-mcp-tools / audit-skills /
# audit-python-apis / audit-project). Mirrors the canonical audit that
# `tests/develop/test_audit.py` runs inside the test suite, but as a
# standalone gate so an audit regression is visible even when the matrix
# is skipped.
#
# `--new-only` ratchets pre-existing audit debt as a baseline against
# main: only NEW violations introduced by the PR fail the gate, so the
# package goes green today while still blocking regressions.
#
# The previous body of this workflow shallow-cloned the entire ecosystem
# and ran `scripts/quality/audit_ecosystem.py` — both of which live only
# in scitex-dev, not in leaf packages. That template was copied here
# verbatim and was always broken (FileNotFoundError on a non-existent
# ecosystem registry file). This version audits just this package.

on:
  schedule:
    - cron: "0 18 * * *"  # 18:00 UTC (~03:00 JST), after Test
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/scitex-writer-quality-audit-on-ubuntu-latest.yml"
  pull_request:
    branches: [main, develop]

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch --new-only baseline ref
        # `--new-only`'s diff-aware compare defaults to `--since develop`
        # (scitex_dev._cli.audit._diff.worktree_at's `since_ref` default),
        # and stages the base via `git worktree add --detach <tmp> <ref>`
        # — which needs a LOCAL ref, not just the remote-tracking
        # `origin/<ref>`. PRs against this repo target `develop` (see
        # `gh pr view --json baseRefName`), but the previous step only
        # ever fetched `main`, so `git worktree add develop` hit "fatal:
        # invalid reference: develop" and the tool fell back to a full
        # strict audit (which then finds pre-existing repo-wide debt
        # unrelated to the PR's own diff). Resolve the actual PR base ref
        # dynamically so this stays correct for PRs against either
        # `develop` or `main`, and only fetch it as a local branch if one
        # doesn't already exist (e.g. a `push` trigger on `develop` itself
        # already has a local `develop` branch checked out).
        run: |
          BASE_REF="${{ github.base_ref }}"
          BASE_REF="${BASE_REF:-develop}"
          echo "AUDIT_BASE_REF=${BASE_REF}" >> "$GITHUB_ENV"
          if ! git rev-parse --verify --quiet "refs/heads/${BASE_REF}" >/dev/null; then
            git fetch origin "${BASE_REF}:${BASE_REF}"
          fi

      - name: Install package + audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "scitex-dev[cli-audit]>=0.17.14"

      - name: Run scitex-dev ecosystem audit-all
        run: scitex-dev ecosystem audit-all scitex-writer --new-only --since "${AUDIT_BASE_REF}" --no-version-check
